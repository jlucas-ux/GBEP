<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<title>GBEP Funding by Fiscal Year</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;max-height:100vh;overflow:hidden;background:white;font-family:'Roboto',sans-serif;}
#wrap{position:absolute;inset:0;display:flex;flex-direction:column;padding:12px 14px 8px;overflow:auto;}
.chart-title{font-size:15px;font-weight:700;color:#1a2332;margin-bottom:2px;}
.chart-subtitle{font-size:12px;color:#64748b;margin-bottom:8px;}
#fy-chart{flex:1;min-height:260px;position:relative;overflow:visible;}
#tooltip{position:fixed;background:rgba(26,35,50,.92);color:white;padding:7px 10px;border-radius:6px;
  font-size:12px;font-family:'Roboto',sans-serif;pointer-events:none;z-index:9999;display:none;line-height:1.5;}
</style>
</head>
<body>
<div id="wrap">
  <div class="chart-title">GBEP Funding by Fiscal Year</div>
  <div class="chart-subtitle" id="fy-subtitle">Award dollars (bars) and project count (line) per fiscal year.</div>
  <div id="fy-chart"></div>
</div>
<div id="tooltip"></div>
<script>
var FONT="'Roboto',sans-serif";
var URL="https://services2.arcgis.com/LYMgRMwHfrWWEg3s/arcgis/rest/services/survey123_6ce0c22f05d74de6bd806994a23cbc63_results/FeatureServer/0/query";
var tip=document.getElementById("tooltip");
function showTooltip(e,html){tip.innerHTML=html;tip.style.display="block";tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY-8)+"px";}
function hideTooltip(){tip.style.display="none";}
function vfs(b){
  var el=document.getElementById("fy-chart");
  var w=el?el.clientWidth:400;
  return Math.min(1,Math.max(0.75,w/800))*b;
}
function fmt$(v){if(v>=1e6)return"$"+(v/1e6).toFixed(1)+"M";if(v>=1e3)return"$"+Math.round(v/1e3)+"K";return"$"+Math.round(v);}

function drawChart(data){
  var el=document.getElementById("fy-chart");
  var width=el.clientWidth||window.innerWidth;
  // Use a fixed chart height so zoom never squishes it — container scrolls instead
  var height=Math.max(el.clientHeight||0, 260);
  var funded=data.filter(function(d){return d.fiscal_year_awarded;});
  var byYear=d3.rollups(funded,function(v){return{count:v.length,award:d3.sum(v,function(d){return d.gbep_award_amount||0;})};},
    function(d){var fy=d.fiscal_year_awarded;if(!fy)return null;if(String(fy).length===4)return parseInt(fy);var p=new Date(fy);if(!isNaN(p))return p.getFullYear();return parseInt(String(fy).slice(0,4));})
    .filter(function(r){return r[0]!==null;})
    .map(function(r){return{year:r[0],count:r[1].count,award:r[1].award};})
    .sort(function(a,b){return a.year-b.year;});
  if(!byYear.length)return;
  var minY=byYear[0].year,maxY=byYear[byYear.length-1].year;
  document.getElementById("fy-subtitle").textContent="Award dollars (bars) and project count (line) per fiscal year, "+minY+"–"+maxY+".";
  if(!width||!height||width<10||height<10)return;
  var minBarW=28,mL=Math.max(58,Math.round(vfs(60))),mR=30;
  var mT=Math.min(20, Math.round(height*0.07));
  var mB=Math.min(75, Math.max(55, Math.round(height*0.26)));
  var chartW=Math.max(width,byYear.length*minBarW+mL+mR),w=chartW-mL-mR,h=height-mT-mB;
  if(h<40){mB=Math.max(30,mB-40);h=height-mT-mB;}
  if(h<20)return;
  var xScale=d3.scaleBand().domain(byYear.map(function(d){return d.year;})).range([0,w]).padding(0.3);
  var yMax=d3.max(byYear,function(d){return d.award;})||1;
  var yScale=d3.scaleLinear().domain([0,yMax*1.15]).range([h,0]);
  var yMaxC=d3.max(byYear,function(d){return d.count;})||1;
  var yScaleC=d3.scaleLinear().domain([0,yMaxC*1.15]).range([h,0]);
  var colorScale=d3.scaleSequential().domain([0,yMax]).interpolator(d3.interpolate("#90caf9","#0d47a1"));
  d3.select("#fy-chart").select("svg").remove();
  // overflow handled by #wrap
  var svg=d3.select("#fy-chart").append("svg").attr("width",chartW).attr("height",height);
  var g=svg.append("g").attr("transform","translate("+mL+","+mT+")");
  g.append("g").call(d3.axisLeft(yScale).ticks(5).tickFormat(function(v){return fmt$(v);}))
    .call(function(ax){ax.select(".domain").remove();ax.selectAll(".tick line").attr("x2",w).attr("stroke","#eee").attr("stroke-dasharray","3,3");ax.selectAll("text").attr("font-size",Math.max(12,vfs(12))).attr("fill","#666");});
  g.append("text").attr("transform","rotate(-90)").attr("x",-h/2).attr("y",-Math.max(32,mL-12))
    .attr("text-anchor","middle").attr("font-size",Math.max(12,vfs(12))).attr("fill","#888").text("GBEP Award ($)");
  g.selectAll(".bar").data(byYear).enter().append("rect").attr("class","bar")
    .attr("x",function(d){return xScale(d.year);}).attr("y",function(d){return yScale(d.award);})
    .attr("width",xScale.bandwidth()).attr("height",function(d){return h-yScale(d.award);})
    .attr("fill",function(d){return colorScale(d.award);}).attr("rx",3).attr("opacity",0.9)
    .on("mousemove",function(event,d){showTooltip(event,"<strong>FY "+d.year+"</strong><br>"+fmt$(d.award)+"<br>"+d.count+" project"+(d.count!==1?"s":""));})
    .on("mouseleave",hideTooltip);
  var lineGen=d3.line().x(function(d){return xScale(d.year)+xScale.bandwidth()/2;}).y(function(d){return yScaleC(d.count);}).curve(d3.curveCatmullRom.alpha(0.5));
  g.append("path").datum(byYear).attr("fill","none").attr("stroke","#1D9E75").attr("stroke-width",2.5).attr("d",lineGen);
  g.selectAll(".dot").data(byYear).enter().append("circle").attr("class","dot")
    .attr("cx",function(d){return xScale(d.year)+xScale.bandwidth()/2;}).attr("cy",function(d){return yScaleC(d.count);})
    .attr("r",4).attr("fill","white").attr("stroke","#1D9E75").attr("stroke-width",2)
    .on("mousemove",function(event,d){showTooltip(event,"<strong>FY "+d.year+"</strong><br>"+d.count+" project"+(d.count!==1?"s":"")+"<br>"+fmt$(d.award));})
    .on("mouseleave",hideTooltip);
  g.append("g").attr("transform","translate(0,"+h+")")
    .call(d3.axisBottom(xScale).tickFormat(function(d){return String(d);}))
    .call(function(ax){ax.select(".domain").attr("stroke","#ddd");ax.selectAll("text").attr("font-size",Math.max(12,vfs(12))).attr("fill","#555").attr("transform","rotate(-45)").attr("text-anchor","end");});
  g.append("text").attr("x",w+4).attr("y",-6)
    .attr("text-anchor","start").attr("font-size",Math.max(12,vfs(11)))
    .attr("fill","#888").attr("font-family",FONT).attr("font-style","italic")
    .text("Fiscal Year →");
}

async function init(){
  var el=document.getElementById("fy-chart");
  if(el && el.clientHeight < 10){
    requestAnimationFrame(init);
    return;
  }
  var res=await fetch(URL+"?where=gbep_award_amount+IS+NOT+NULL&outFields=fiscal_year_awarded,gbep_award_amount&f=json&resultRecordCount=2000");
  var d=await res.json();
  drawChart(d.features.map(function(f){return f.attributes;}));
}
init();
window.addEventListener("resize",function(){
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      init();
    });
  });
});
</script>
</body>
</html>
