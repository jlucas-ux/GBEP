<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Roboto',sans-serif;}

    #banner{
      width:100%;height:100%;
      background:linear-gradient(135deg,#0d47a1 0%,#1677bc 60%,#54a9ad 100%);
      display:flex;flex-direction:column;justify-content:center;padding:0 36px;
    }

    /* Default style — subheader strip */
    .mode-strip #banner{flex-direction:row;align-items:center;gap:32px;}
    .mode-strip .page-title{font-size:26px;}
    .mode-strip .page-tagline{font-size:13px;font-weight:300;}
    .mode-strip .divider{display:block;}
    .mode-strip .title-block{flex-shrink:0;}
    .mode-strip .blurb-block{flex:1;}

    /* Home style — tall card */
    .mode-home #banner{flex-direction:column;justify-content:center;gap:10px;}
    .mode-home .page-title{font-size:28px;}
    .mode-home .page-tagline{font-size:14px;font-weight:300;max-width:520px;}
    .mode-home .divider{display:none;}

    .page-title{font-weight:900;color:white;letter-spacing:-0.5px;line-height:1.15;}
    .page-title span{color:#b2ebf2;}
    .page-tagline{color:rgba(255,255,255,0.82);line-height:1.65;margin-top:4px;}
    .divider{width:2px;height:60%;background:rgba(255,255,255,0.25);flex-shrink:0;}
  </style>
</head>
<body>
<div id="mode-wrapper">
<div id="banner">
  <div class="title-block">
    <div class="page-title" id="page-title">Browse Database</div>
  </div>
  <div class="divider"></div>
  <div class="blurb-block">
    <div class="page-tagline" id="page-blurb">Search and filter all GBEP project records by attributes. View matching records and download data, GIS files, and attachments.</div>
  </div>
</div>
</div>

<script>
  var params=new URLSearchParams(window.location.search);
  var mode=params.get("mode")||"strip";
  document.getElementById("mode-wrapper").className="mode-"+mode;
  if(params.get("title")) document.getElementById("page-title").innerHTML=params.get("title");
  if(params.get("blurb")) document.getElementById("page-blurb").textContent=params.get("blurb");
</script>
</body>
</html>
