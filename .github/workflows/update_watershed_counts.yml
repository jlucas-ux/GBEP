name: Update Watershed Counts

on:
  schedule:
    # Runs nightly at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Also allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit the JSON back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests shapely

      - name: Run spatial join script
        run: python scripts/update_watershed_counts.py

      - name: Commit updated watershed_counts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watershed_counts.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update watershed counts [skip ci]"
          git push
