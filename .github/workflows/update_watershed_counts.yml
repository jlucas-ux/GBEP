name: Update Watershed Counts
 
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
 
jobs:
  update:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests shapely
 
      - name: Run spatial join and update ArcGIS layer
        env:
          ARCGIS_USERNAME: ${{ secrets.ARCGIS_USERNAME }}
          ARCGIS_PASSWORD: ${{ secrets.ARCGIS_PASSWORD }}
        run: python scripts/update_watershed_layer.py
 
      - name: Commit updated watershed_counts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watershed_counts.json
          git diff --cached --quiet || git commit -m "chore: update watershed counts [skip ci]"
          git push
 
