name: Fetch Watershed Geometry

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.3.1

      - name: Fetch watershed boundaries
        env:
          WATERSHED_URL: ${{ secrets.WATERSHED_URL }}
        run: |
          curl -s "${WATERSHED_URL}" \
            > data/watersheds.geojson

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/watersheds.geojson
          git diff --staged --quiet || git commit -m "Add watershed boundary geometry"
          git push
