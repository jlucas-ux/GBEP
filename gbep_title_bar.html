<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>GBEP Title Bar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Roboto',sans-serif;}
#bar{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:clamp(8px,1.5vh,20px) clamp(14px,2vw,32px);
  background:white;
  border-bottom:3px solid #1677bc;
}
#title{
  font-size:clamp(14px,1.6vw,26px);
  font-weight:900;
  color:#1a2332;
  line-height:1.2;
}
#subtitle{
  font-size:clamp(11px,0.9vw,15px);
  color:#64748b;
  margin-top:3px;
  line-height:1.4;
}
</style>
</head>
<body>
<div id="bar">
  <div id="title"></div>
  <div id="subtitle"></div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var title = params.get('title') || 'GBEP';
var subtitle = params.get('subtitle') || '';
document.getElementById('title').textContent = title;
var subEl = document.getElementById('subtitle');
if(subtitle){
  subEl.textContent = subtitle;
} else {
  subEl.style.display = 'none';
}
</script>
</body>
</html>
