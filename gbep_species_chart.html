<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<title>GBEP Projects by Focal Species</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:transparent;font-family:'Roboto',sans-serif;}
#wrap{width:100%;height:100%;display:flex;flex-direction:column;padding:12px 14px 8px;}
.chart-title{font-size:15px;font-weight:700;color:#1a2332;margin-bottom:2px;}
.chart-subtitle{font-size:12px;color:#64748b;margin-bottom:8px;}
#species-chart{flex:1;min-height:200px;position:relative;overflow:hidden;}
#tooltip{position:fixed;background:rgba(26,35,50,.92);color:white;padding:7px 10px;border-radius:6px;
  font-size:12px;font-family:'Roboto',sans-serif;pointer-events:none;z-index:9999;display:none;line-height:1.5;}
</style>
</head>
<body>
<div id="wrap">
  <div class="chart-title">Projects by Focal Species</div>
  <div class="chart-subtitle">Each layer of the raindrop represents the percentage of funded projects that targeted each focal species. Hover a layer for details.</div>
  <div id="species-chart"></div>
</div>
<div id="tooltip"></div>
<script>
var FONT="'Roboto',sans-serif";
var SPE_PALETTE=["#1677bc","#0C6E56","#1D9E75","#006994","#00695c","#0d47a1","#1b5e20","#27ae60","#8e44ad","#e67e22"];
var URL="https://services2.arcgis.com/LYMgRMwHfrWWEg3s/arcgis/rest/services/survey123_6ce0c22f05d74de6bd806994a23cbc63_results/FeatureServer/0/query";
var tip=document.getElementById("tooltip");
function showTooltip(e,html){tip.innerHTML=html;tip.style.display="block";tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY-8)+"px";}
function hideTooltip(){tip.style.display="none";}
function vfs(b){return Math.min(1,Math.max(0.6,window.innerWidth/1600))*b;}

var SPECIES_LABELS={
  "invasive_species_control_eradic":"Invasive Species Control/Eradication",
  "invasive species control eradic":"Invasive Species Control/Eradication",
  "state_listed_species_species_of":"State Listed Species/Species of Greatest Conservation Need",
  "state listed species species of":"State Listed Species/Species of Greatest Conservation Need",
  "endangered_threatened_species":"Endangered/Threatened Species",
  "endangered threatened species":"Endangered/Threatened Species",
  "nongame_wildlife":"Nongame Wildlife",
  "no_focal_species_during_planning":"No Focal Species During Planning"
};

function normalizeSpecies(s){
  var clean=String(s).replace(/_/g," ").replace(/\s+/g," ").trim();
  var key=clean.toLowerCase();
  if(SPECIES_LABELS[key])return SPECIES_LABELS[key];
  for(var k in SPECIES_LABELS){if(key.indexOf(k)===0||k.indexOf(key)===0)return SPECIES_LABELS[k];}
  return clean.replace(/\b\w/g,function(c){return c.toUpperCase();});
}

function drawSpeciesChart(data) {
  var el = document.getElementById("species-chart");
  el.innerHTML = "";
  el.style.position = "relative";
  var width = el.clientWidth || 400, height = el.clientHeight || 200;

  // ── Data ──────────────────────────────────────────────────────────────────
  var funded = data.filter(function(d) {
    return d.gbep_award_amount &&
           d.targeted_focal_species &&
           d.targeted_focal_species.trim() !== "";
  });

  // Build species counts, expanding "other" with its companion field
  // Use two maps: lowercase key for dedup, display label for rendering
  var sKey = {};    // key (lowercase) → count
  var sLabel = {};  // key (lowercase) → display string

  funded.forEach(function(row) {
    row.targeted_focal_species.split(",")
      .map(function(s) { return s.trim(); })
      .filter(function(s) { return s; })
      .forEach(function(raw) {
        var norm = normalizeSpecies(raw);
        var key  = norm.toLowerCase().trim();

        // Expand "other" using targeted_focal_species_other
        if (key === "other" || key === "other focal species" ||
            key.indexOf("other_targeted") === 0 ||
            key.indexOf("other targeted") === 0) {
          var desc = (row.targeted_focal_species_other || "").trim()
                       .replace(/_/g, " ").replace(/\s+/g, " ");
          var label = desc ? "Other: " + desc : "Other";
          var labelKey = label.toLowerCase();
          sKey[labelKey]   = (sKey[labelKey]   || 0) + 1;
          sLabel[labelKey] = label;
        } else {
          sKey[key]   = (sKey[key]   || 0) + 1;
          sLabel[key] = norm;  // store display label separately from key
        }
      });
  });

  var counts = Object.keys(sKey)
    .map(function(k) { return { label: sLabel[k], count: sKey[k] }; })
    .sort(function(a, b) { return b.count - a.count; });
  if (!counts.length) return;
  var total = d3.sum(counts, function(d) { return d.count; });

  // Collect "other species benefited" notes
  var otherBenefited = [];
  funded.forEach(function(row) {
    var val = row.what_other_species_were_identif ||
              row.what_other_species_were_identifi || "";
    val = val.trim().replace(/_/g, " ").replace(/\s+/g, " ");
    if (val && val.toLowerCase() !== "none" && val.toLowerCase() !== "n/a" &&
        val.toLowerCase() !== "null") {
      otherBenefited.push(val);
    }
  });
  // Deduplicate
  var uniqueBenefited = otherBenefited.filter(function(v, i, a) {
    return a.indexOf(v) === i;
  });

  // ── Layout ────────────────────────────────────────────────────────────────
  // If there are benefited species notes, reserve bottom strip
  var noteH = uniqueBenefited.length > 0 ? Math.min(38, Math.round(height * 0.18)) : 0;
  var chartH = height - noteH;

  var leftW = Math.max(120, width * 0.42);

  // ── SVG (raindrop only) ───────────────────────────────────────────────────
  var svg = d3.select("#species-chart").append("svg")
    .attr("width", width).attr("height", chartH)
    .style("font-family", FONT);

  // Raindrop geometry
  var dropAreaW = width - leftW - 10;
  var dropH     = chartH - 16;
  var r         = Math.min(dropAreaW * 0.50, dropH * 0.35);
  var cx        = leftW + dropAreaW / 2;
  var topY      = 8;
  var bottomCy  = topY + dropH - r - 4;
  var dropBottom = bottomCy + r;
  var dropTotalH = dropBottom - topY;

  var dropPath =
    "M " + cx + "," + topY +
    " L " + (cx + r) + "," + bottomCy +
    " A " + r + "," + r + " 0 0 1 " + (cx - r) + "," + bottomCy +
    " Z";

  var clipId = "spe-drop-clip";
  svg.append("defs").append("clipPath").attr("id", clipId)
    .append("path").attr("d", dropPath);

  // ── Stacked layers — largest at base, smallest at tip ─────────────────────
  var curBottom = dropBottom;

  // Pass 1: fills + dividers
  counts.forEach(function(c, i) {
    var pct    = c.count / total;
    var layerH = pct * dropTotalH;
    var layerTop = curBottom - layerH;

    svg.append("rect")
      .attr("x", cx - r - 4).attr("y", layerTop)
      .attr("width", (r + 4) * 2).attr("height", layerH + 1)
      .attr("fill", SPE_PALETTE[i % SPE_PALETTE.length])
      .attr("clip-path", "url(#" + clipId + ")");

    if (i < counts.length - 1) {
      svg.append("line")
        .attr("x1", cx - r - 4).attr("x2", cx + r + 4)
        .attr("y1", layerTop).attr("y2", layerTop)
        .attr("stroke", "white").attr("stroke-width", 2)
        .attr("clip-path", "url(#" + clipId + ")");
    }
    curBottom = layerTop;
  });

  // Outline
  svg.append("path").attr("d", dropPath)
    .attr("fill", "none")
    .attr("stroke", "rgba(255,255,255,0.35)")
    .attr("stroke-width", 2);

  // Pass 2: % labels inside layers
  curBottom = dropBottom;
  counts.forEach(function(c, i) {
    var pct    = c.count / total;
    var layerH = pct * dropTotalH;
    var layerTop = curBottom - layerH;
    var midY   = layerTop + layerH / 2;
    if (layerH >= 16) {
      var fs = Math.max(10, Math.min(vfs(16), Math.floor(layerH * 0.44)));
      svg.append("text")
        .attr("x", cx).attr("y", midY)
        .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
        .attr("font-size", fs).attr("font-weight", "700")
        .attr("fill", "rgba(255,255,255,0.95)")
        .attr("font-family", FONT)
        .style("pointer-events", "none")
        .text(Math.round(pct * 100) + "%");
    }
    curBottom = layerTop;
  });

  // Pass 3: invisible hover rects
  curBottom = dropBottom;
  counts.forEach(function(c, i) {
    var pct    = c.count / total;
    var layerH = pct * dropTotalH;
    var layerTop = curBottom - layerH;
    svg.append("rect")
      .attr("x", cx - r - 4).attr("y", layerTop)
      .attr("width", (r + 4) * 2).attr("height", layerH)
      .attr("fill", "transparent")
      .attr("clip-path", "url(#" + clipId + ")")
      .style("cursor", "pointer")
      .on("mousemove", function(event) {
        showTooltip(event,
          "<strong>" + c.label + "</strong><br>" +
          Math.round(pct * 100) + "% of projects<br>" +
          c.count + " project" + (c.count !== 1 ? "s" : "")
        );
      })
      .on("mouseleave", hideTooltip);
    curBottom = layerTop;
  });

  // ── Legend (left side, HTML) ───────────────────────────────────────────────
  var list = document.createElement("div");
  list.style.cssText =
    "position:absolute;left:0;top:0;" +
    "width:" + (leftW - 8) + "px;height:" + chartH + "px;" +
    "display:flex;flex-direction:column;justify-content:center;" +
    "font-family:" + FONT + ";overflow:hidden;pointer-events:none;" +
    "box-sizing:border-box;padding:4px 4px 4px 6px;";

  var rowH   = chartH / counts.length;
  var pctFS  = Math.max(12, Math.min(vfs(26), Math.floor(rowH * 0.52)));
  var nameFS = Math.max(12, Math.min(vfs(15), Math.floor(pctFS * 0.72)));
  var swatch = Math.max(7,  Math.floor(pctFS * 0.50));

  // Legend is reversed: largest at bottom matches raindrop base
  counts.slice().reverse().forEach(function(c, revIdx) {
    // Original index (for color matching)
    var i = counts.length - 1 - revIdx;
    var color = SPE_PALETTE[i % SPE_PALETTE.length];
    var pct   = Math.round(c.count / total * 100);

    var topPad = Math.max(1, Math.floor((rowH - nameFS * 1.3) / 2));
    var row    = document.createElement("div");
    row.style.cssText =
      "display:flex;align-items:flex-start;gap:5px;" +
      "height:" + Math.floor(rowH) + "px;overflow:hidden;flex-shrink:0;" +
      "box-sizing:border-box;padding-top:" + topPad + "px;";

    // Color swatch
    row.innerHTML =
      '<div style="width:' + swatch + 'px;height:' + swatch + 'px;background:' + color +
        ';border-radius:50%;flex-shrink:0;margin-top:' + Math.round(nameFS * 0.08) + 'px;"></div>' +
      // % in matching color
      '<div style="font-size:' + pctFS + 'px;font-weight:900;color:' + color +
        ';flex-shrink:0;letter-spacing:-0.5px;line-height:1;">' + pct + '%</div>' +
      // Name
      '<div style="font-size:' + nameFS + 'px;font-weight:600;color:#334155;' +
        'overflow-wrap:break-word;word-break:break-word;min-width:0;flex:1;line-height:1.25;">' +
        c.label + '</div>';

    list.appendChild(row);
  });

  el.appendChild(list);

  // ── "Other species benefited" note strip ──────────────────────────────────
  if (noteH > 0 && uniqueBenefited.length > 0) {
    var note = document.createElement("div");
    var noteFS = Math.max(9, Math.min(11, Math.floor(noteH * 0.30)));
    note.style.cssText =
      "position:absolute;left:0;bottom:0;width:100%;height:" + noteH + "px;" +
      "background:rgba(22,119,188,0.06);border-top:1px solid rgba(22,119,188,0.15);" +
      "padding:3px 8px;box-sizing:border-box;overflow:hidden;" +
      "font-family:" + FONT + ";font-size:" + noteFS + "px;color:#555;line-height:1.35;";

    var preview = uniqueBenefited.slice(0, 3).join("; ");
    if (uniqueBenefited.length > 3) preview += " (+" + (uniqueBenefited.length - 3) + " more)";
    note.innerHTML =
      '<span style="font-weight:700;color:#1677bc;">Also benefiting:</span> ' + preview;
    note.title = uniqueBenefited.join("\n");
    el.appendChild(note);
  }
}

async function init(){
  var res=await fetch(URL+"?where=gbep_award_amount+IS+NOT+NULL&outFields=*&f=json&resultRecordCount=2000");
  var d=await res.json();
  window._data=d.features.map(function(f){return f.attributes;});
  // wait for layout to settle before measuring dimensions
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      drawSpeciesChart(window._data);
    });
  });
}
// ensure body has height before running
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
}else{
  init();
}
window.addEventListener("resize",function(){if(window._data)drawSpeciesChart(window._data);});
</script>
</body>
</html>
