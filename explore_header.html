<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }
    #header {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(6px, 0.8vw, 14px) clamp(8px, 1vw, 16px);
    }
    .chart-title {
      font-size: clamp(13px, 1.15vw, 19px);
      font-weight: 700;
      color: #1677bc;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .chart-subtitle {
      font-size: clamp(10px, 0.85vw, 14px);
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="chart-title" id="title-el"></div>
    <div class="chart-subtitle" id="blurb-el"></div>
  </div>
  <script>
    // Reads ?title= and ?blurb= from the URL, same pattern as hero_banner.html
    var params = new URLSearchParams(window.location.search);
    var title = params.get('title') || 'Explore';
    var blurb = params.get('blurb') || 'Click and drag to pan, scroll to zoom, and use the layer controls to filter by watershed, project type, or funding status.';
    document.getElementById('title-el').textContent = title;
    document.getElementById('blurb-el').textContent = blurb;
  </script>
</body>
</html>
