<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:white;font-family:'Roboto',sans-serif;}
    #container{width:100%;height:100%;position:relative;}
    svg{display:block;width:100%;height:100%;}
    .watershed-zero{fill:#e8f4fb;stroke:white;stroke-width:0.8px;}
    .watershed-active{stroke:white;stroke-width:1px;cursor:pointer;transition:opacity 0.15s;}
    .watershed-active:hover{opacity:0.75;}
    #tooltip{
      position:fixed;background:rgba(15,23,42,0.93);color:white;
      padding:8px 12px;border-radius:7px;font-size:13px;
      pointer-events:none;opacity:0;transition:opacity 0.15s;
      max-width:200px;line-height:1.5;z-index:9999;
      box-shadow:0 4px 16px rgba(0,0,0,0.25);font-family:'Roboto',sans-serif;
    }
    #loading{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      font-size:13px;color:#1677bc;font-weight:500;
    }
    #updated{
      position:absolute;bottom:8px;left:10px;
      font-size:10px;color:#bbb;pointer-events:none;
    }
  </style>
</head>
<body>
<div id="container">
  <div id="loading">Loading watershed data…</div>
  <div id="tooltip"></div>
  <div id="updated"></div>
</div>

<script>
  var WATERSHED_URL =
    "https://services2.arcgis.com/LYMgRMwHfrWWEg3s/arcgis/rest/services/" +
    "GBEP_Watersheds_Summary_Stats/FeatureServer/0/query" +
    "?where=1%3D1&outFields=Name&outSR=4326&f=geojson&resultRecordCount=500";

  var COUNTS_URL = "watershed_counts.json";

  var tooltip = document.getElementById("tooltip");
  function showTooltip(evt, html){
    tooltip.innerHTML = html;
    tooltip.style.opacity = 1;
    tooltip.style.left = (evt.clientX + 14) + "px";
    tooltip.style.top = (evt.clientY - 32) + "px";
  }
  function hideTooltip(){ tooltip.style.opacity = 0; }

  async function draw(){
    // Fetch both in parallel
    var [countsRes, geoRes] = await Promise.all([
      fetch(COUNTS_URL),
      fetch(WATERSHED_URL)
    ]);
    var countsData = await countsRes.json();
    var geoData    = await geoRes.json();

    // Build count lookup
    var countMap = {};
    countsData.watersheds.forEach(function(w){
      countMap[w.name] = w.project_count;
    });

    // Attach counts to features
    geoData.features.forEach(function(f){
      f.properties.project_count = countMap[f.properties.Name] || 0;
    });

    var maxCount = d3.max(geoData.features, function(f){
      return f.properties.project_count;
    }) || 1;

    // Color scale
    var colorScale = d3.scaleSequential()
      .domain([0, maxCount])
      .interpolator(d3.interpolate("#cce5f5", "#0d47a1"));

    // Fit to container
    var w = document.getElementById("container").clientWidth;
    var h = document.getElementById("container").clientHeight;

    var projection = d3.geoMercator().fitExtent([[20, 20], [w-20, h-40]], geoData);
    var path = d3.geoPath().projection(projection);

    document.getElementById("loading").style.display = "none";

    var svg = d3.select("#container").append("svg")
      .attr("width", w).attr("height", h);

    // Watersheds
    svg.selectAll("path")
      .data(geoData.features)
      .enter().append("path")
      .attr("d", path)
      .attr("fill", function(d){
        return d.properties.project_count > 0
          ? colorScale(d.properties.project_count)
          : "#e8f4fb";
      })
      .attr("stroke", "white")
      .attr("stroke-width", 0.8)
      .on("mousemove", function(event, d){
        var n = d.properties.Name;
        var c = d.properties.project_count;
        showTooltip(event,
          "<strong>" + n + "</strong><br>" +
          c + " project" + (c !== 1 ? "s" : "")
        );
      })
      .on("mouseleave", hideTooltip);

    // Count labels on active watersheds
    svg.selectAll(".ws-label")
      .data(geoData.features.filter(function(d){
        return d.properties.project_count > 0;
      }))
      .enter().append("text")
      .attr("class", "ws-label")
      .attr("transform", function(d){
        var c = path.centroid(d);
        return "translate(" + c[0] + "," + c[1] + ")";
      })
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle")
      .attr("font-size", 13)
      .attr("font-weight", "700")
      .attr("fill", "white")
      .attr("pointer-events", "none")
      .text(function(d){ return d.properties.project_count; });

    // Watershed name labels for active ones (below count)
    svg.selectAll(".ws-name")
      .data(geoData.features.filter(function(d){
        return d.properties.project_count > 0;
      }))
      .enter().append("text")
      .attr("class", "ws-name")
      .attr("transform", function(d){
        var c = path.centroid(d);
        return "translate(" + c[0] + "," + (c[1] + 14) + ")";
      })
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle")
      .attr("font-size", 10)
      .attr("font-weight", "500")
      .attr("fill", "rgba(255,255,255,0.85)")
      .attr("pointer-events", "none")
      .text(function(d){ return d.properties.Name; });

    // Legend
    var legendW = 120, legendH = 10;
    var legendX = w - legendW - 12, legendY = h - 28;
    var defs = svg.append("defs");
    var grad = defs.append("linearGradient").attr("id", "ws-grad");
    grad.append("stop").attr("offset", "0%").attr("stop-color", "#cce5f5");
    grad.append("stop").attr("offset", "100%").attr("stop-color", "#0d47a1");
    svg.append("rect")
      .attr("x", legendX).attr("y", legendY)
      .attr("width", legendW).attr("height", legendH)
      .attr("fill", "url(#ws-grad)").attr("rx", 3);
    svg.append("text")
      .attr("x", legendX).attr("y", legendY - 4)
      .attr("font-size", 10).attr("fill", "#888")
      .attr("font-family", "Roboto,sans-serif")
      .text("0 projects");
    svg.append("text")
      .attr("x", legendX + legendW).attr("y", legendY - 4)
      .attr("font-size", 10).attr("fill", "#888")
      .attr("text-anchor", "end")
      .attr("font-family", "Roboto,sans-serif")
      .text(maxCount + " projects");

    // Updated timestamp
    if(countsData.updated && countsData.updated !== "pending first run"){
      var dt = new Date(countsData.updated);
      document.getElementById("updated").textContent =
        "Data updated " + dt.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
    }
  }

  draw();
</script>
</body>
</html>
